name: Build gnoP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Ubuntu Linux", os: ubuntu-latest, build_type: Release }
          - { name: "Windows MSVC", os: windows-latest, build_type: Release }

    steps:
    - uses: actions/checkout@v4

    # --- LINUX DEPENDENCIES ---
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev cmake build-essential

    # --- WINDOWS DEPENDENCIES (via vcpkg) ---
    - name: Setup vcpkg
      if: runner.os == 'Windows'
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'latest' # Oder ein spezifischer Commit für Stabilität

    - name: Install Windows Libraries
      if: runner.os == 'Windows'
      run: vcpkg install sdl2 sdl2-ttf --triplet x64-windows

    # --- CONFIGURE & BUILD ---
    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} \
          ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake' || '' }}

    - name: Build Project
      run: cmake --build build --config ${{ matrix.config.build_type }}

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.config.name }}
        path: |
          build/gnoP
          build/gnoP.exe
